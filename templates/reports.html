<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monthly Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container-fluid py-3">
        <a href="/" class="btn btn-sm btn-secondary mb-3"> ⬅ Back</a>
        <h4 class="mb-4 text-center">📊 Monthly Business Report</h4>

        {% for item in monthly_data %}
        <div class="card mb-3 shadow-sm border-0" style="border-radius: 12px;">
            <div class="card-header bg-white fw-bold">{{ item.month }}</div>
            <div class="card-body py-2">
                <div class="d-flex justify-content-between">
                    <span>Total Sales (Debit):</span>
                    <span class="text-danger fw-bold">₹{{ item.debit }}</span>
                </div>
                <div class="d-flex justify-content-between">
                    <span>Cash Received (Credit):</span>
                    <span class="text-success fw-bold">₹{{ item.credit }}</span>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
                  </html>
